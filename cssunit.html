<!DOCTYPE html>
<html>
<head>
    <title>CSS Units Task</title>
    <style>
        body {
            font-size: 16px;
        }

        .px {
            font-size: 20px;
            background-color: lightblue;
            margin: 10px;
        }

        .em {
            font-size: 2em;
            background-color: lightgreen;
            margin: 10px;
        }

        .rem {
            font-size: 2rem;
            background-color: lightcoral;
            margin: 10px;
        }

        .percent {
            width: 50%;
            background-color: yellow;
            margin: 10px;
        }

        .vw {
            width: 50vw;
            background-color: orange;
            margin: 10px;
        }

        .vh {
            height: 20vh;
            background-color: pink;
            margin: 10px;
        }
    </style>
</head>
<body>

    <div class="px">Pixel (px) Unit</div>
    <div class="em">EM Unit</div>
    <div class="rem">REM Unit</div>
    <div class="percent">Percentage (%) Unit</div>
    <div class="vw">Viewport Width (vw)</div>
    <div class="vh">Viewport Height (vh)</div>

</body>
</html>
